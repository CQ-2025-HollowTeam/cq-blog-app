<article class="flex flex-col gap-8 pb-8"> 
    <!--Header-->
    <section class="relative">
        <img class="w-full h-80 object-cover opacity-60" [src]="postResource.value()?.image | postImage" [alt]="post().title">
        <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-base-200 to-transparent"></div>
        <div class="absolute bottom-0 flex flex-col gap-2 p-4 w-full">
            <h1 class="text-4xl">{{ postResource.value()?.title }}</h1>
            <div class="flex items-center justify-between">
                <p class="text-gray-400">{{ postResource.value()?.createdAt| date | uppercase }}</p>
                <!--TAGS-->
                <div class="flex gap-2">
                    @for (category of postResource.value()?.categories; track $index) {
                        <post-category [category]="category"></post-category>
                    }
                </div>
            </div>
        </div>
    </section>
    <!--CONTENT-->
    <section class="flex flex-col sm:flex-row flex-wrap gap-8 px-4">

        <div class="sm:w-[calc(70%-16px)] flex flex-col gap-8">
            <div [innerHTML]="postResource.value()?.content"></div>
            <post-comments [comments]="postResource.value()?.comments ?? []"></post-comments>
        </div>

        <aside class="w-full sm:flex flex-col sm:w-[calc(30%-16px)] grid grid-cols-1 gap-5">
            <!--Autor-->
            <div class="flex flex-col gap-2">
                <div class="flex gap-2">
                    <span class="pi pi-user text-gray-400 pt-1"></span>
                    <p class="text-gray-400">Author</p>
                </div>
                <div class="p-4 card-border rounded-2xl flex gap-2 items-center hover:cursor-pointer hover:bg-base-100">
                    <div class="avatar">
                        <div class="w-12 h-12 rounded-full">
                            <img src="https://img.daisyui.com/images/profile/demo/yellingcat@192.webp" />
                        </div>
                    </div>
                    <p>{{ postResource.value()?.author?.name }}</p>
                </div>
            </div>

            <!--RELATED-->
            <div class="flex flex-col gap-2">
                <div class="flex gap-2">
                    <span class="pi pi-id-card text-gray-400 pt-1"></span>
                    <p class="text-gray-400">Related posts</p>
                </div>
                <posts-carousel 
                    [posts]="highlightedPosts()" 
                    [layoutType]="cardLayout.SMALL"
                    [spaceBetween]="10"
                ></posts-carousel>
            </div>
        </aside>

    </section>

</article>
