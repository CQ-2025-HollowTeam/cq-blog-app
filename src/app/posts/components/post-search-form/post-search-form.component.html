<form class="flex flex-col sm:flex-row  justify-center items-center gap-6">
    <label class="w-full input bg-base-200">
        <span class="pi pi-search"></span>
        <input #inputSearch [value]="inputSearchValue()" (keyup)="inputSearchValue.set(inputSearch.value)" type="search" placeholder="Search post..." />
    </label>

    <select class="select w-full sm:w-64 bg-base-200 hover:cursor-pointer">
        <option disabled selected>All Authors</option>
        <option>Fernando</option>
        <option>Gabriel</option>
        <option>Ricardo</option>
    </select>

    <select class="select w-full sm:w-64 bg-base-200 hover:cursor-pointer">
        <option disabled selected>All Categories</option>
        <option>Angular</option>
        <option>Java</option>
        <option>NestJs</option>
    </select>
</form>
