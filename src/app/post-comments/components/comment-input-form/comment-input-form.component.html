<form class="flex gap-4" [formGroup]="commentForm" (ngSubmit)="submit()">
    <div class="avatar">
        <div class="w-12 h-12 rounded-full">
            <img src="https://img.daisyui.com/images/profile/demo/yellingcat@192.webp" />
        </div>
    </div>
    <div class="flex flex-col gap-4 w-full justify-center">
        @if(userService.user()) {
            <textarea
                formControlName="content"
                class="textarea resize-none rounded-2xl bg-base-200 w-full" 
                placeholder="Escribe tu comentario..."
                (focus)="showActionBar.set(true)"
            ></textarea>
            @if(showActionBar()) {
                <div class="w-full flex justify-end">
                    <button class="btn btn-primary" [disabled]="commentForm.invalid">Responder</button>
                </div>
            }
        }@else {
            <p class="text-gray-400">Debes de tener una cuenta para poder añadir comentarios.</p>
        }
        
    </div>   
</form>
