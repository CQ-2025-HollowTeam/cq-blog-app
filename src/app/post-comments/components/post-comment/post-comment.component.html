<div class="flex flex-col gap-4">
    <div class="flex gap-4">
        <div class="avatar">
            <div class="w-12 h-12 rounded-full">
                <img src="https://img.daisyui.com/images/profile/demo/yellingcat@192.webp" />
            </div>
        </div>
        <!--Comment-->
        <div class="w-full flex flex-col">
            <div class="rounded-2xl card-border p-4 flex flex-col gap-4">
                <div class="flex gap-4 items-center">
                    <p class="font-bold">Sergi Monzó</p>
                    <p class="text-gray-400">15 ene 2025</p>
                </div>
                <div>
                    <p>{{ comment().content }}</p>
                </div>
            </div>

            <!--ACTIONS BAR-->
            <div class="flex gap-4">
                <button class="btn btn-ghost p-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="size-[1.2em]"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>
                    15
                </button>
                <button (click)="toggleInputForm()" class="btn btn-ghost p-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="size-[1.2em]"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>
                    Responder
                </button>
                @if(comment().comments) {
                    <button (click)="toggleShowReplies()" class="btn btn-ghost p-0">Mostrar respuestas</button>
                }
            </div>

            <!--RESPONSE INPUT AND OTHER COMMENT RESPONSES-->
            <div class="flex flex-col gap-4" [class.mt-4]="showInputForm() || comment().comments" >
                <!--INPUT-->
                @if(showInputForm()) {
                    <comment-input-form></comment-input-form>
                }

                <!--COMMENT RESPONSES-->
                @if(showReplies() && comment().comments) {
                    @for (commentResponse of comment().comments; track commentResponse.id) {
                        <post-comment [comment]="commentResponse"></post-comment>
                    }
                }
            </div>

            
        </div>
        
    </div>
</div>
