<div class="flex flex-col gap-4">
    <div class="flex gap-4">
        <div class="avatar">
            <div class="w-12 h-12 rounded-full">
                <img src="https://img.daisyui.com/images/profile/demo/yellingcat@192.webp" />
            </div>
        </div>
        <!--Comment-->
        <div class="w-full flex flex-col">
            <div class="rounded-2xl card-border p-4 flex flex-col gap-4">
                <div class="flex gap-4 items-center">
                    <p class="font-bold">{{ comment().author.name }}</p>
                    <p class="text-gray-400">{{ comment().updatedAt | date | uppercase }}</p>
                </div>
                <div>
                    <p>{{ comment().content }}</p>
                </div>
            </div>

            <!--ACTIONS BAR-->
            <div class="flex gap-4">
                <button class="btn btn-ghost p-0" (click)="addReaction()">
                    @if(likedComment()) {
                        <span class="pi pi-thumbs-up-fill"></span>
                    } @else {
                        <span class="pi pi-thumbs-up"></span>
                    }
                    {{ comment()._count?.reactions || 0 }}
                </button>
                <button (click)="toggleInputForm()" class="btn btn-ghost p-0">
                    <span class="pi pi-comment"></span>
                    Responder
                </button>
                @if(comment().replies?.length) {
                    <button (click)="toggleShowReplies()" class="btn btn-ghost p-0">Mostrar respuestas</button>
                }
            </div>

            <!--RESPONSE INPUT AND OTHER COMMENT RESPONSES-->
            <div class="flex flex-col gap-4" [class.mt-4]="showInputForm() || comment().reactions" >
                <!--INPUT-->
                @if(showInputForm()) {
                    <!--<comment-input-form></comment-input-form>-->
                }

                <!--COMMENT RESPONSES-->
                <!--@if(showReplies() && comment().reactions) {
                    @for (commentResponse of comment().reactions; track commentResponse.id) {
                        <post-comment [comment]="commentResponse"></post-comment>
                    }
            }-->
            </div>

            
        </div>
        
    </div>
</div>
