<!-- Botón de inicio de sesión -->
<button class="btn btn-square" (click)="openLogin()">
    <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 16 16"
    >
        <path
            fill="currentColor"
            d="M8 9c3.85 0 7 2.5 7 4.5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 13.5C1 11.5 4.15 9 8 9m0-8a3.5 3.5 0 1 1 0 7a3.5 3.5 0 0 1 0-7"
        />
    </svg>
</button>

<!-- Dialog de inicio de sesión -->
<modal-dialog
    [(open)]="loginDialog"
    (onClose)="loginForm.resetForm()"
    [showClose]="true"
    size="s"
>
    <div ngProjectAs="modal-header">Iniciar sesión</div>
    <div class="flex flex-col gap-4">
        <login-form
            #loginForm
            (onLogin)="loginForm.resetForm(); loginDialog.set(false)"
        />
        <p class="text-center">
            ¿No tienes cuenta?
            <a
                (click)="loginForm.resetForm(); openRegister()"
                class="cursor-pointer link-hover"
                >Regístrate</a
            >
        </p>
    </div>
</modal-dialog>

<!-- Dialog de Registro -->
<modal-dialog
    [(open)]="registerDialog"
    (onClose)="registerForm.resetForm()"
    [showClose]="true"
    size="s"
>
    <header ngProjectAs="modal-header" class="flex flex-col items-center">
        <div class="rounded-full bg-base-200 p-3">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 16 16"
            >
                <path
                    fill="currentColor"
                    fill-rule="evenodd"
                    d="M8 6.5a2 2 0 1 0 0-4a2 2 0 0 0 0 4M8 8a3.5 3.5 0 1 0 0-7a3.5 3.5 0 0 0 0 7m1 1.225a.71.71 0 0 0-.679-.72A11 11 0 0 0 8 8.5c-3.85 0-7 2-7 4A2.5 2.5 0 0 0 3.5 15h8.75a.75.75 0 0 0 0-1.5H3.5a1 1 0 0 1-1-1c0-.204.22-.809 1.32-1.459C4.838 10.44 6.32 10 8 10q.088 0 .175.002c.442.008.825-.335.825-.777M13.75 8a.75.75 0 0 0-1.5 0v1.25H11a.75.75 0 0 0 0 1.5h1.25V12a.75.75 0 0 0 1.5 0v-1.25H15a.75.75 0 0 0 0-1.5h-1.25z"
                    clip-rule="evenodd"
                />
            </svg>
        </div>
        <h2>Crear cuenta</h2>
    </header>
    <div class="flex flex-col gap-4">
        <register-form #registerForm />
        <p class="text-center">
            Ya tienes cuenta?
            <a
                (click)="registerForm.resetForm(); openLogin()"
                class="cursor-pointer link-hover"
                >Inicia sesión</a
            >
        </p>
    </div>
</modal-dialog>
