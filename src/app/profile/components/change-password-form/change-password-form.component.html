<div class="w-full flex flex-col gap-2">
    <div class="flex flex-row justify-between items-center">
        <p>
            <span class="font-bold text-lg">Cambiar Contraseña</span>
            <br />
            <span>
                Asegúrate de usar una contraseña segura para proteger tu cuenta.
            </span>
        </p>
    </div>
    <hr />
    <form
        class="flex flex-col items-center gap-2"
        [formGroup]="form"
        (ngSubmit)="updatePassword()"
    >
        <div class="w-full">
            <legend class="fieldset-legend">Contraseña actual</legend>
            <label class="input w-full">
                <input type="text" formControlName="oldPassword" />
            </label>
            <ng-container
                *ngTemplateOutlet="formError; context: { field: 'oldPassword' }"
            />
        </div>
        <div class="w-full">
            <legend class="fieldset-legend">Nueva contraseña</legend>
            <label class="input w-full">
                <input type="text" formControlName="password" />
            </label>
            <ng-container
                *ngTemplateOutlet="formError; context: { field: 'password' }"
            />
        </div>
        <div class="w-full">
            <legend class="fieldset-legend">Confirmar nueva contraseña</legend>
            <label class="input w-full">
                <input type="text" formControlName="confirmPassword" />
            </label>
            <ng-container
                *ngTemplateOutlet="
                    formError;
                    context: { field: 'confirmPassword' }
                "
            />
        </div>

        <div class="flex flex-row self-end justify-end gap-4 mt-4">
            <button type="submit" class="btn btn-primary">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"
                >
                    <path
                        fill="currentColor"
                        fill-rule="evenodd"
                        d="M10.313 7.488L9 7.653v5.37a.5.5 0 0 1-.353.478l-1.62.498l-.006.001h-.008l-.007-.006l-.005-.007v-.003L7 13.979V7.653l-1.313-.165a1.5 1.5 0 0 1-1.271-1.144l-.588-2.5A1.5 1.5 0 0 1 5.288 2h5.424a1.5 1.5 0 0 1 1.46 1.844l-.588 2.5a1.5 1.5 0 0 1-1.271 1.144m2.731-.8A3 3 0 0 1 10.5 8.976v4.046a2 2 0 0 1-1.412 1.911l-1.62.499A1.52 1.52 0 0 1 5.5 13.979V8.977a3 3 0 0 1-2.544-2.29l-.588-2.5A3 3 0 0 1 5.288.5h5.424a3 3 0 0 1 2.92 3.687zM6.75 3.5a.75.75 0 0 0 0 1.5h2.5a.75.75 0 0 0 0-1.5z"
                        clip-rule="evenodd"
                    />
                </svg>
                Actualizar Contraseña
            </button>
        </div>
    </form>
</div>

<ng-template #formError let-field="field">
    @if (formUtils.isValidField(form, field)){
    <small class="form-text text-error">
        {{ formUtils.getFieldError(form, field) }}
    </small>
    }
</ng-template>
