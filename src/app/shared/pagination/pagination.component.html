<div class="join flex justify-center items-center">
    @for(page of getPagesList(); track page) {
        <button 
            class="join-item btn" 
            [class.btn-primary]="activePage() == page"
            (click)="setCurrentpage(page)"
        >
            {{ page }}
        </button>
    }@empty {
        <p>No hay páginas.</p>
    }
</div>
