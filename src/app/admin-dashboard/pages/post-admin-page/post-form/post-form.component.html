<form [formGroup]="postForm" class="h-ful w-full flex flex-col gap-5">
    
    <!--TITLE-->
    <div>
        <fieldset class="fieldset p-0">
            <legend class="fieldset-legend text-sm">Título del post *</legend>
            <input formControlName="title" type="text" class="input w-full bg-base-200" placeholder="Escribe un título..." />
        </fieldset>
    </div>

    <!--ID SLUG-->
    <div>
        <fieldset class="fieldset p-0">
            <legend class="fieldset-legend text-sm">Slug (URL) *</legend>
            <input formControlName="slug" type="text" class="input w-full bg-base-200" placeholder="Slug..." />
        </fieldset>
    </div>

    <!--IMAGE-->
    <div>
        <fieldset class="fieldset p-0">
            <legend class="fieldset-legend text-sm">Imagen de portada</legend>
            <input formControlName="image" type="file" class="file-input bg-base-200 w-full" />
        </fieldset>
    </div>

    <!--EDITOR DE TEXTO-->
    <div>
        <fieldset class="fieldset">
            <legend class="fieldset-legend text-sm">Contenido del post *</legend>
                <editor
                formControlName="content"
                [init]="init"
                licenseKey="gpl"
                [apiKey]="apiKey"            
            />
        </fieldset>
    </div>

    @if(categoriesResource.hasValue()) {
        <div class="card-border rounded-2xl flex flex-col gap-2">
            <legend class="fieldset-legend text-sm">Categorías *</legend>
            <div class="flex gap-2">
                <select #categorySelector class="select w-full bg-base-200 hover:cursor-pointer">
                    <option disabled selected>All Categories</option>
                    @for (category of categoriesResource.value(); track category.id) {
                        <option [value]="category.id">{{category.name}}</option>
                    }
                </select>
                <button class="btn btn-neutral" (click)="addCategory(+categorySelector.value)">Añadir</button>
            </div>
            <div>
                @for (category of postForm.get('categories')?.value; track category.id) {
                    <post-category [category]="category"></post-category>
                }
            </div>
        </div>
    }   
    
    <div class="card-border rounded-2xl flex justify-between gap-2">
        <button (click)="removePost()" class="btn btn-link text-error p-0"><span class="pi pi-trash text-error"></span>Eliminar post</button>
        <div class="flex gap-2">
            <button (click)="discardChanges($event)" class="btn btn-ghost">Descartar</button>
            <button (click)="onSubmit()" class="btn btn-primary">Publicar</button>
        </div>
    </div>

</form>
